version: 2

project_name: olb

# The release workflow runs the quality gates, license check, and
# THIRD_PARTY_NOTICES regeneration as steps before invoking GoReleaser, so there
# are no `before` hooks here — GoReleaser only builds, archives, and publishes.

builds:
  - id: darwin
    binary: olb
    ldflags:
      - -s -w
      - -X github.com/krisiasty/olb/internal/version.Version={{.Version}}
      - -X github.com/krisiasty/olb/internal/version.Commit={{.Commit}}
      - -X github.com/krisiasty/olb/internal/version.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - id: others
    binary: olb
    ldflags:
      - -s -w
      - -X github.com/krisiasty/olb/internal/version.Version={{.Version}}
      - -X github.com/krisiasty/olb/internal/version.Commit={{.Commit}}
      - -X github.com/krisiasty/olb/internal/version.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

# One bundled archive per platform (tar.gz everywhere, zip on Windows), each
# carrying the binary plus the legal files. A raw `binary` format can't include
# extra files, so archives are the vehicle for LICENSE/NOTICE/THIRD_PARTY_NOTICES.
# Darwin is a separate archive id so the Homebrew cask references macOS only.
archives:
  - id: darwin
    ids:
      - darwin
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - THIRD_PARTY_NOTICES
      - README.md
  - id: others
    ids:
      - others
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - THIRD_PARTY_NOTICES
      - README.md
  # Raw, uncompressed binaries for direct download (no extraction). These carry
  # no side files — the embedded `olb --licenses` still reproduces the notices.
  - id: binaries
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: olb
    ids:
      - darwin
    homepage: "https://github.com/krisiasty/olb"
    description: "Interactive terminal UI for inspecting OpenStack Octavia load balancers (Amphora and OVN providers)."
    license: "Apache-2.0"
    repository:
      owner: krisiasty
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    binaries:
      - olb
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", staged_path]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  abbrev: 8
  format: "- [{{ .SHA }}](https://github.com/krisiasty/olb/commit/{{ .SHA }}) {{ .Message }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: "{{ .IsV0 }}"
